# Rubrics Evaluator 配置文件
# 使用方法：python rubrics_evaluator.py --config config.yaml

# LLM 配置
llm:
  base_url: "https://integrate.api.nvidia.com/v1"
  api_key: "your api key"
  model: "z-ai/glm4.7"
  timeout: 60
  max_retries: 3

# 批处理配置
batch:
  size: 1          # 每批处理的条目数
  delay: 0         # 批次间延迟（秒）

# 输出配置
output:
  format: "json"   # json 或 text
  pretty: true     # 美化输出
